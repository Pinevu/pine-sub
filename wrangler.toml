name = "pine-sub"
main = "_worker.js"
compatibility_date = "2024-12-01"

# KV 命名空间（必须）
[[kv_namespaces]]
binding = "KV"
id = ""  # ← 替换为你的 KV ID
preview_id = ""  # ← 替换为预览 KV ID

# 环境变量
[vars]
ADMIN_KEY = ""  # ← 设置管理面板登录密码
SESSION_SECRET = ""  # ← 设置随机字符串作为会话密钥

# 路由
routes = [
  { pattern = "pine-sub.nooh.cc", custom_domain = true }
]
